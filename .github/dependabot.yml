# Free for public repos. Keeps Python deps, npm devDeps, and CI actions patched so a
# known-vulnerable dependency surfaces as a PR instead of lingering.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
