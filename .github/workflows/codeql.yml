# CodeQL static analysis — free for public repos. Scans the Python backend and the
# JavaScript frontend for security issues on every push/PR and weekly.
name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "27 3 * * 1"   # weekly, so newly-published rules catch old code too

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Analyze
        uses: github/codeql-action/analyze@v4
