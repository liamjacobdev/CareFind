name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type-check (mypy --strict)
        run: mypy

      - name: Audit shipped Python deps (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Run tests (≥90% line+branch coverage gate, E1)
        run: pytest --cov=app --cov-branch --cov-fail-under=90 -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend bundle
        run: npm run build

      - name: Verify committed bundle matches src/ (reproducible build)
        run: git diff --exit-code carefind.bundle.js

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Audit shipped npm deps
        # The app ships no runtime npm dependencies (the bundle is built, Leaflet loads
        # from a CDN), so the shipped surface must be clean. Dev-only tooling vulns are
        # tracked by Dependabot instead of blocking the build.
        run: npm audit --omit=dev

      - name: Run unit tests (with coverage threshold)
        run: npm test

      - name: Install Playwright browsers (chromium + firefox + webkit)
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run e2e (golden journey + axe, all three engines)
        run: npm run test:e2e

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan every commit
      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link-check docs (relative links — E2)
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline checks the relative/file links we control (not flaky external URLs).
          args: "--offline --no-progress Readme.md CONTRIBUTING.md docs/**/*.md"
          fail: true
