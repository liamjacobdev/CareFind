# Offline-harvest the validated FHIR Plan-Net payers into membership bitmaps (Rail 1), so
# they serve as instant, always-on verified filters instead of live per-NPI calls.
#
# This is the monthly harvest the rebuild is built around. It runs `app.harvest_fhir` per
# payer and commits payers/, which triggers Vercel's GitHub integration to redeploy. The
# harvester only writes a COMPLETE harvest (app.harvest_fhir.harvest_to_bitmap's
# completeness guard) — a payer that times out or errors keeps its last-good bitmap and
# lets /healthz staleness surface, so a partial set is NEVER shipped as if complete.
#
# Race-free by design: a single sequential job (not a parallel matrix) owns the shared
# payers/manifest.json, then commits once. The giants (UnitedHealthcare, Humana) can exceed
# a single job's budget — harvest them one at a time via *Run workflow* with the `payers`
# input and let the completeness guard decide whether the result is committable. A fully
# sharded matrix for the giants (by state/taxonomy facet) is the documented next step.
#
# On a PUBLIC repo, GitHub Actions standard-runner minutes are unlimited (the 2,000-min/mo
# cap is private-repo only), which is what makes this monthly harvest genuinely $0.
name: Harvest verified payer bitmaps

on:
  schedule:
    - cron: "23 7 8 * *"   # monthly, ~08:23 UTC on the 8th
  workflow_dispatch:
    inputs:
      payers:
        description: "Space-separated payer ids (blank = the default fast set)"
        required: false
        default: ""
      facet:
        description: "Shard-and-union a GIANT by this browse facet (e.g. 'address-state'). Dispatch ONE payer at a time when set."
        required: false
        default: ""
      values:
        description: "Comma-separated facet values covering the WHOLE directory (e.g. all states+DC+territories). Required with facet."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: harvest-payers
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # under the 6h job cap; a giant that doesn't finish commits nothing
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Harvest each payer into its bitmap (complete harvests only are written)
        env:
          # Default to the payers that reliably finish within one job; harvest the giants
          # individually via workflow_dispatch. A failed/incomplete harvest is non-fatal —
          # the completeness guard simply leaves the last-good bitmap in place.
          PAYERS_INPUT: ${{ github.event.inputs.payers }}
          FACET_INPUT: ${{ github.event.inputs.facet }}
          VALUES_INPUT: ${{ github.event.inputs.values }}
        run: |
          set -u
          # Default set = payers whose Plan-Net directory allows an unfiltered browse (what
          # the Rail-1 harvester walks). Excellus is intentionally excluded: it rejects the
          # unfiltered browse (HTTP 400) and needs the TiC rail or a faceted harvest instead.
          PAYERS="${PAYERS_INPUT:-cigna priority_partners}"
          echo "Harvesting: $PAYERS"
          for p in $PAYERS; do
            echo "::group::harvest $p"
            if [ -n "${FACET_INPUT}" ]; then
              # Sharded (accumulating) path for a giant: walk every facet value in one process,
              # union, and write once — only if EVERY shard completed (harvest_sharded_to_bitmap's
              # guard). Dispatch ONE giant per run so it owns the sequential manifest write.
              python -m app.harvest_fhir "$p" --facet "$FACET_INPUT" --values "$VALUES_INPUT" \
                || echo "sharded harvest $p did not complete — keeping last-good."
            else
              python -m app.harvest_fhir "$p" || echo "harvest $p did not complete — keeping last-good."
            fi
            echo "::endgroup::"
          done

      - name: Commit refreshed bitmaps
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add payers/
          if git diff --cached --quiet; then
            echo "No payer bitmap changed this run."
          else
            git commit -m "data: refresh verified payer bitmaps (auto)"
            git push
            echo "Pushed refreshed payer bitmaps — Vercel will redeploy."
          fi
