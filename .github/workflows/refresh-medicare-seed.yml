# Auto-refresh the baked Medicare membership bitmap for the cardless Vercel deploy
# (docs/deploy.md).
#
# The Vercel deployment serves verified insurance from read-only Roaring bitmaps baked into
# the repo (payers/*.roaring). CMS republishes the Medicare Fee-For-Service enrollment file
# quarterly, so this workflow rebuilds the Medicare bitmap from the *current* CSV
# (auto-discovered from data.cms.gov's DCAT catalog — no hard-coded dated URL) and commits
# payers/. The push triggers Vercel's GitHub integration to redeploy automatically.
#
# Runs on the 1st-ish of Jan/Apr/Jul/Oct (just after CMS's quarterly update) and on demand.
# The manifest's fetched_at bumps every run (refreshing the freshness SLO clock so a healthy
# quarter never trips /healthz's dead-man's-switch); the multi-MB bitmap blob only changes
# when the enrolled-NPI set actually changed. Requires no secrets — only the default
# GITHUB_TOKEN with contents:write.
name: Refresh Medicare bitmap

on:
  schedule:
    - cron: "37 10 5 1,4,7,10 *"   # quarterly, a few days into the new quarter
  workflow_dispatch:
    inputs:
      csv_url:
        description: "Override CSV URL (blank = auto-discover the latest from data.cms.gov)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: refresh-medicare-bitmap
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Resolve the CSV URL (auto-discover unless overridden)
        id: url
        env:
          OVERRIDE: ${{ github.event.inputs.csv_url }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "csv=$OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            url="$(python -c 'from app.cms_catalog import latest_medicare_csv_url; print(latest_medicare_csv_url())')"
            echo "Discovered: $url"
            echo "csv=$url" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild the Medicare membership bitmap from the current CSV
        env:
          INNETWORK_DB: ./innetwork.db   # scratch sqlite the builder ingests into, then ports
        run: |
          rm -f innetwork.db
          python -m app.build_membership medicare "${{ steps.url.outputs.csv }}"
          python -c "import json; n=json.load(open('payers/manifest.json'))['payers']['medicare']['count']; print('medicare NPIs:', n); assert n > 1_000_000, 'suspiciously few — refusing to ship'"

      - name: Commit the refreshed bitmap + manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add payers/medicare.roaring payers/manifest.json
          if git diff --cached --quiet; then
            echo "Bitmap + manifest unchanged — nothing to commit."
          else
            git commit -m "data: refresh Medicare bitmap (auto)"
            git push
            echo "Pushed a refreshed Medicare bitmap — Vercel will redeploy."
          fi
