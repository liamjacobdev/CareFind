[pytest]
asyncio_mode = auto
# Put the repo root on sys.path so `from app import ...` (in conftest + tests) resolves
# regardless of how pytest is invoked. `python -m pytest` adds the cwd implicitly, but the
# bare `pytest` console script (what CI runs) does not — without this, CI fails at
# conftest import with ModuleNotFoundError: No module named 'app'.
pythonpath = .
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
