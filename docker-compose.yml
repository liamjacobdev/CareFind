services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      CAREFIND_DB: /data/carefind.db
      # Behind the Caddy front-end below, trust X-Forwarded-For so the rate limiter
      # buckets on the real client IP (see app/main.py:_client_ip). The api service
      # is only reachable via Caddy (expose, not ports), so the header is trustworthy.
      CAREFIND_TRUST_PROXY: "true"
    volumes:
      - carefind-data:/data        # persists Medicare index + geocode cache
      # Optional: wire verified FHIR payers. Create payers.json first
      # (cp payers.example.json payers.json), then uncomment:
      # - ./payers.json:/app/payers.json:ro
    expose:
      - "8000"
    healthcheck:
      # Uses the stdlib (the slim image has no curl). /healthz is unauthenticated
      # and not under /api/, so it isn't rate-limited.
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  carefind-data:
  caddy-data:
  caddy-config:
