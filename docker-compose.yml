services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      INNETWORK_DB: /data/innetwork.db
      # Behind the Caddy front-end below, trust X-Forwarded-For so the rate limiter
      # buckets on the real client IP (see app/main.py:_client_ip). The api service
      # is only reachable via Caddy (expose, not ports), so the header is trustworthy.
      INNETWORK_TRUST_PROXY: "true"
      # Scope uvicorn's proxy-header trust to the edge network's subnet (below), so
      # only the Caddy container — never some other host that reaches the port — is
      # trusted to set X-Forwarded-For. Replaces the old --forwarded-allow-ips "*".
      FORWARDED_ALLOW_IPS: "172.28.0.0/24"
    networks:
      - edge
    volumes:
      - innetwork-data:/data        # persists Medicare index + geocode cache
      # Optional: wire verified FHIR payers. Create payers.json first
      # (cp payers.example.json payers.json), then uncomment:
      # - ./payers.json:/app/payers.json:ro
    expose:
      - "8000"
    healthcheck:
      # Container liveness uses /readyz (datastore reachable + registry built), NOT
      # /healthz: /healthz returns 503 on STALE DATA (the dead-man's-switch an uptime
      # monitor watches), which must not trigger a container restart — a restart doesn't
      # fix staleness, only a re-ingest does. Stdlib (the slim image has no curl).
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    networks:
      - edge
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

networks:
  # Fixed subnet so FORWARDED_ALLOW_IPS (on the api service) can name it as a CIDR.
  # Both services live here; the api is only reachable via Caddy on this network.
  edge:
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  innetwork-data:
  caddy-data:
  caddy-config:
